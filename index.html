<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Júlia's 14th Era</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&family=Dancing+Script:wght@700&family=Bangers&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: black; margin: 0; scroll-behavior: smooth; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-cursive { font-family: 'Dancing Script', cursive; }
        .font-retro { font-family: 'Bangers', cursive; }
        .st-wall { background: #0c0c14; position: relative; }
        .st-glow { box-shadow: 0 0 15px 5px rgba(254, 240, 138, 0.9); background: #fef08a !important; }
        .snap-container { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .snap-container::-webkit-scrollbar { display: none; }
        .snap-section { height: 100vh; scroll-snap-align: start; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .polaroid { background: white; padding: 12px 12px 40px 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-15px) rotate(2deg); } }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .alphabet-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 8px; max-width: 450px; width: 100%; }
        @media (max-width: 640px) { .alphabet-grid { grid-template-columns: repeat(7, 1fr); gap: 4px; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [stLight, setStLight] = useState(-1);
            const [activeSection, setActiveSection] = useState(0);
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

            useEffect(() => {
                const sequence = [9, 20, 11, 8, 0]; // J-U-L-I-A
                let i = 0;
                const interval = setInterval(() => {
                    setStLight(sequence[i]);
                    i = (i + 1) % sequence.length;
                }, 900);
                return () => clearInterval(interval);
            }, []);

            const handleScroll = (e) => {
                const idx = Math.round(e.target.scrollTop / window.innerHeight);
                setActiveSection(idx);
            };

            return (
                <div className="snap-container" onScroll={handleScroll}>
                    <div className="fixed top-0 left-0 w-full h-1.5 flex gap-1 z-[100] p-1 bg-black/20">
                        {[...Array(10)].map((_, i) => (
                            <div key={i} className="flex-1 h-full bg-white/10 rounded-full overflow-hidden">
                                <div className={`h-full bg-rose-500 transition-all duration-500 ${activeSection >= i ? 'w-full' : 'w-0'}`}></div>
                            </div>
                        ))}
                    </div>

                    <section className="snap-section bg-white text-black">
                        <div className="text-center">
                            <h1 className="text-7xl md:text-[10rem] font-serif uppercase italic leading-none mb-4">Júlia</h1>
                            <div className="h-px w-32 bg-black/10 mx-auto my-8"></div>
                            <h2 className="text-2xl font-light tracking-[0.4em] text-zinc-500 uppercase">Chapter 14</h2>
                            <p className="mt-24 text-[9px] uppercase tracking-[0.3em] text-rose-500 animate-pulse font-bold">Dá um scroll pra baixo, filha!</p>
                        </div>
                    </section>

                    <section className="snap-section st-wall p-4">
                        <h2 className="text-red-700 font-serif italic text-3xl mb-10 drop-shadow-[0_0_10px_red]">Gênesis: Onde tudo começou</h2>
                        <div className="alphabet-grid mb-12">
                            {alphabet.map((l, idx) => (
                                <div key={l} className="flex flex-col items-center">
                                    <div className={`w-3 h-3 md:w-5 md:h-5 rounded-full mb-1 bg-zinc-800 transition-all duration-300 ${stLight === idx ? 'st-glow' : ''}`}></div>
                                    <span className={`text-[10px] md:text-sm font-serif ${stLight === idx ? 'text-yellow-100' : 'text-zinc-700'}`}>{l}</span>
                                </div>
                            ))}
                        </div>
                        <div className="polaroid -rotate-3 scale-110">
                            <img src="bebe.jpeg" className="w-48 md:w-56 h-auto object-cover" />
                            <p className="font-cursive text-zinc-800 text-center mt-3 text-xl">Nossa pequena luz</p>
                        </div>
                    </section>

                    <section className="snap-section bg-[#fdfcfb]">
                        <div className="polaroid rotate-6">
                            <img src="2anos.jpeg" className="w-60 md:w-72 h-auto" />
                            <p className="font-cursive text-rose-400 text-center mt-3 text-2xl">2 aninhos de pura fofura</p>
                        </div>
                    </section>

                    <section className="snap-section bg-yellow-400 text-zinc-800">
                        <div className="absolute top-0 w-full h-24 bg-orange-600 flex items-center justify-center font-retro text-white text-3xl italic">Isso, isso, isso!</div>
                        <div className="polaroid -rotate-2 border-8 border-orange-500 mt-12 scale-110">
                            <img src="chaves.jpeg" className="w-64 h-80 object-cover" />
                            <p className="font-retro text-center mt-4 text-3xl italic">Juju no Barril</p>
                        </div>
                    </section>

                    <section className="snap-section bg-rose-50 p-6">
                        <div className="polaroid shadow-2xl">
                            <img src="pijamas.jpeg" className="w-64 h-80 object-cover" />
                            <p className="font-serif italic text-zinc-400 text-center mt-3 text-sm">Tal mãe, tal filha!</p>
                        </div>
                        <p className="mt-14 text-zinc-500 font-light text-center italic">Grudadinhas desde sempre...</p>
                    </section>

                    <section className="snap-section bg-zinc-950 text-white p-6">
                        <div className="w-72 h-[30rem] border border-white/10 overflow-hidden relative rounded-2xl">
                            <img src="bolsa_amarela.jpeg" className="w-full h-full object-cover" />
                            <div className="absolute bottom-8 left-8 text-left">
                                <p className="text-yellow-400 font-black text-5xl italic uppercase mb-1">2022</p>
                                <p className="text-white text-[10px] font-light tracking-[0.3em] uppercase">Lookinho de milhões!</p>
                            </div>
                        </div>
                    </section>

                    <section className="snap-section bg-[#e5e7eb]">
                        <div className="polaroid -rotate-3 mb-10 border border-zinc-200">
                            <img src="mafalda.jpeg" className="w-64 h-80 object-cover" />
                            <p className="font-serif text-zinc-400 text-center mt-3 text-sm italic">Bate-papo com a Mafalda em Montevideo</p>
                        </div>
                    </section>

                    <section className="snap-section bg-sky-950 text-white p-6">
                        <div className="bg-white/5 backdrop-blur-xl p-4 border border-white/10 rounded-[2.5rem] shadow-2xl relative">
                            <div className="absolute -top-4 -right-4 bg-yellow-400 text-black px-6 py-2 rounded-full font-black text-[10px] uppercase italic">PRO PLAYER</div>
                            <img src="beach_tennis.jpeg" className="w-72 h-[26rem] object-cover rounded-[2rem]" />
                        </div>
                        <h3 className="mt-10 font-black text-6xl italic text-sky-300 uppercase">Campeã!</h3>
                    </section>

                    <section className="snap-section bg-[#f9f9f9] p-6">
                        <div className="polaroid shadow-2xl border-t-[12px] border-rose-400 scale-105">
                            <img src="placa_montevideo.jpeg" className="w-80 h-[28rem] object-cover" />
                            <p className="font-serif italic text-zinc-400 text-center mt-4 tracking-widest uppercase text-xs">Nossa melhor viagem</p>
                        </div>
                    </section>

                    <section className="snap-section bg-white text-black p-10 text-center">
                        <div className="max-w-md w-full space-y-12">
                            <h2 className="text-5xl font-serif italic text-zinc-800 leading-tight">Nossa Júlia,</h2>
                            <div className="space-y-8 text-zinc-500 font-light text-lg">
                                <p>Filha, a gente olha pra trás e só consegue sorrir. Ver quem você se tornou nos enche de um orgulho que não cabe no peito.</p>
                                <p className="font-semibold text-zinc-900 text-xl italic px-4">Você é nossa luz e o que você significa pra nós é tudo!</p>
                                <p>Te amamos demais, aproveita muito seu dia!</p>
                            </div>
                            <div className="pt-14 border-t border-zinc-100">
                                <p className="text-rose-500 font-bold uppercase text-[10px] mb-4">Com todo o nosso amor,</p>
                                <p className="text-5xl font-cursive text-zinc-900">Papai Gustavo & Mamãe Juliana</p>
                                <p className="mt-4 text-xs text-zinc-400 tracking-widest uppercase">26/03/2026</p>
                            </div>
                        </div>
                    </section>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
