<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Júlia's 14th Era | The Journey</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&family=Dancing+Script:wght@700&family=Bangers&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: black; margin: 0; scroll-behavior: smooth; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-cursive { font-family: 'Dancing Script', cursive; }
        .font-retro { font-family: 'Bangers', cursive; }
        
        .st-wall { background: #0c0c14; position: relative; }
        .st-glow { box-shadow: 0 0 15px 5px rgba(254, 240, 138, 0.9); background: #fef08a !important; }
        
        /* Container de Scroll Snap (Estilo TikTok/Reels) */
        .snap-container { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .snap-container::-webkit-scrollbar { display: none; }
        .snap-section { height: 100vh; scroll-snap-align: start; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* Estilo Moldura Polaroid */
        .polaroid { background: white; padding: 12px 12px 40px 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); transition: all 0.5s ease; }
        
        /* Animação Flutuante */
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-15px) rotate(2deg); } }
        .animate-float { animation: float 4s ease-in-out infinite; }

        /* Grelha do Alfabeto (Stranger Things) */
        .alphabet-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 8px; max-width: 450px; width: 100%; }
        @media (max-width: 640px) { .alphabet-grid { grid-template-columns: repeat(7, 1fr); gap: 4px; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [stLight, setStLight] = useState(-1);
            const [activeSection, setActiveSection] = useState(0);
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

            // Sequência de Luzes Stranger Things: J-U-L-I-A
            useEffect(() => {
                const sequence = [9, 20, 11, 8, 0]; 
                let i = 0;
                const interval = setInterval(() => {
                    setStLight(sequence[i]);
                    i = (i + 1) % sequence.length;
                }, 900);
                return () => clearInterval(interval);
            }, []);

            // Observador de Scroll para a Barra de Progresso
            const handleScroll = (e) => {
                const idx = Math.round(e.target.scrollTop / window.innerHeight);
                setActiveSection(idx);
            };

            return (
                <div className="snap-container" onScroll={handleScroll}>
                    
                    {/* Barra de Progresso Superior (Estilo Story) */}
                    <div className="fixed top-0 left-0 w-full h-1.5 flex gap-1 z-[100] p-1 bg-black/20">
                        {[...Array(10)].map((_, i) => (
                            <div key={i} className="flex-1 h-full bg-white/10 rounded-full overflow-hidden">
                                <div className={`h-full bg-rose-500 transition-all duration-500 ${activeSection >= i ? 'w-full' : 'w-0'}`}></div>
                            </div>
                        ))}
                    </div>

                    {/* 0. CAPA LUXO (Estilo Revista de Moda) */}
                    <section className="snap-section bg-white text-black">
                        <div className="text-center">
                            <span className="text-[10px] tracking-[0.6em] text-zinc-400 mb-6 block font-bold uppercase italic">Special Edition</span>
                            <h1 className="text-7xl md:text-[10rem] font-serif uppercase italic leading-none mb-4">Júlia</h1>
                            <div className="h-px w-32 bg-black/10 mx-auto my-8"></div>
                            <h2 className="text-2xl font-light tracking-[0.4em] text-zinc-500 uppercase">Chapter Fourteen</h2>
                            <p className="mt-24 text-[9px] uppercase tracking-[0.3em] text-rose-500 animate-pulse font-bold">Desliza para começar</p>
                        </div>
                        <div className="absolute bottom-10 right-10 text-[18vw] font-serif text-zinc-100 -z-0 select-none pointer-events-none">2026</div>
                    </section>

                    {/* 1. GÊNESIS (STRANGER THINGS) - BEBÊ */}
                    <section className="snap-section st-wall p-4">
                        <h2 className="text-red-700 font-serif italic text-3xl mb-10 drop-shadow-[0_0_10px_red]">Gênesis: The Origin</h2>
                        <div className="alphabet-grid mb-12">
                            {alphabet.map((l, idx) => (
                                <div key={l} className="flex flex-col items-center">
                                    <div className={`w-3 h-3 md:w-5 md:h-5 rounded-full mb-1 bg-zinc-800 transition-all duration-300 ${stLight === idx ? 'st-glow' : ''}`}></div>
                                    <span className={`text-[10px] md:text-sm font-serif ${stLight === idx ? 'text-yellow-100' : 'text-zinc-700'}`}>{l}</span>
                                </div>
                            ))}
                        </div>
                        <div className="polaroid -rotate-3 scale-110">
                            {/* Imagem Bebe (Extensão .jpeg) */}
                            <img src="bebe.jpeg" className="w-48 md:w-56 h-auto object-cover" />
                            <p className="font-cursive text-zinc-800 text-center mt-3 text-xl">Where it all began</p>
                        </div>
                    </section>

                    {/* 2. 2 ANOS - DOCE INFÂNCIA */}
                    <section className="snap-section bg-[#fdfcfb]">
                        <h2 className="text-zinc-300 font-serif uppercase tracking-[0.5em] text-[10px] mb-12">Childhood Dreams</h2>
                        <div className="relative">
                            <div className="polaroid rotate-6">
                                {/* Imagem 2 Anos (Extensão .jpeg) */}
                                <img src="2anos.jpeg" className="w-60 md:w-72 h-auto" />
                                <p className="font-cursive text-rose-400 text-center mt-3 text-2xl">A doçura dos 2 aninhos</p>
                            </div>
                            <div className="absolute -top-10 -left-10 text-6xl animate-bounce">🍭</div>
                        </div>
                    </section>

                    {/* 3. BARRIL DO CHAVES - FUN ERA (Estilo Retrô/HQ) */}
                    <section className="snap-section bg-yellow-400">
                        <div className="absolute top-0 w-full h-24 bg-orange-600 flex items-center justify-center font-retro text-white text-3xl tracking-widest uppercase italic">Isso, isso, isso!</div>
                        <div className="polaroid -rotate-2 border-8 border-orange-500 mt-12 scale-110">
                            {/* Imagem Chaves (Extensão .jpeg) */}
                            <img src="chaves.jpeg" className="w-64 h-80 object-cover contrast-110" />
                            <p className="font-retro text-zinc-800 text-center mt-4 text-3xl italic">Alegria no Barril</p>
                        </div>
                        <p className="mt-12 text-orange-800 font-bold text-center italic px-8 max-w-xs uppercase text-[10px] tracking-widest">Nostalgia Pura</p>
                    </section>

                    {/* 4. PIJAMAS IGUAIS - MÃE E FILHA (Cumplicidade) */}
                    <section className="snap-section bg-rose-50 p-6">
                        <div className="flex flex-col items-center">
                            <div className="relative">
                                <div className="polaroid shadow-2xl">
                                    {/* Imagem Pijamas (Extensão .jpeg) */}
                                    <img src="pijamas.jpeg" className="w-64 h-80 object-cover" />
                                    <p className="font-serif italic text-zinc-400 text-center mt-3 text-sm">Twin souls: Mom & Daughter</p>
                                </div>
                                <div className="absolute -bottom-6 -right-6 text-5xl animate-float">💖</div>
                            </div>
                            <div className="mt-14 text-center max-w-xs">
                                <h3 className="font-serif text-2xl italic text-rose-500 mb-2">Cumplicidade</h3>
                                <p className="text-zinc-500 font-light text-sm italic leading-relaxed">"O mesmo pijama, o mesmo coração. Uma conexão eterna entre mãe e filha."</p>
                            </div>
                        </div>
                    </section>

                    {/* 5. 2022 - BOLSA AMARELA (GLOW UP/FASHION) */}
                    <section className="snap-section bg-zinc-950 text-white p-6">
                        <div className="z-10 text-center">
                            <span className="text-yellow-400 font-bold tracking-[0.5em] text-[10px] uppercase mb-12 block">Fashion Archive</span>
                            <div className="relative inline-block">
                                <div className="w-72 h-[30rem] border border-white/10 overflow-hidden relative shadow-[0_0_60px_rgba(250,204,21,0.15)] rounded-2xl">
                                    {/* Imagem Bolsa Amarela (Extensão .jpeg) */}
                                    <img src="bolsa_amarela.jpeg" className="w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                                    <div className="absolute bottom-8 left-8 text-left">
                                        <p className="text-yellow-400 font-black text-5xl italic tracking-tighter uppercase mb-1">2022</p>
                                        <p className="text-white text-[10px] font-light tracking-[0.3em] uppercase">The Yellow Bag Statement</p>
                                    </div>
                                </div>
                                <div className="absolute -top-8 -right-8 text-6xl opacity-40 grayscale animate-pulse">✨</div>
                            </div>
                        </div>
                    </section>

                    {/* 6. MAFALDA - MONTEVIDEO (Viagem/Inteligência) */}
                    <section className="snap-section bg-[#e5e7eb]">
                        <div className="flex flex-col items-center px-6">
                            <div className="polaroid -rotate-3 mb-10 border border-zinc-200">
                                {/* Imagem Mafalda (Extensão .jpeg) */}
                                <img src="mafalda.jpeg" className="w-64 h-80 object-cover" />
                                <div className="mt-3 flex items-center justify-between border-t border-zinc-100 pt-3">
                                    <p className="font-serif text-zinc-400 text-[10px] italic">Montevideo Diaries</p>
                                    <p className="font-bold text-red-500 text-xs tracking-widest uppercase">Mafalda</p>
                                </div>
                            </div>
                            <div className="max-w-xs text-center space-y-4">
                                <h4 className="font-serif text-xl italic text-zinc-700">Conversas em Montevideo</h4>
                                <p className="text-zinc-500 font-light text-sm italic leading-loose">"A inteligência da Mafalda e a tua beleza única. Um encontro inesquecível na tua jornada."</p>
                            </div>
                        </div>
                    </section>

                    {/* 7. BEACH TENNIS CHAMPIONSHIP (Atleta/Força) */}
                    <section className="snap-section bg-sky-950 text-white p-6 overflow-hidden">
                        <div className="absolute inset-0 opacity-5 flex flex-wrap gap-12 p-12">
                            {[...Array(12)].map((_, i) => <span key={i} className="text-6xl grayscale">🎾</span>)}
                        </div>
                        <div className="z-10 flex flex-col items-center">
                            <div className="bg-white/5 backdrop-blur-xl p-4 border border-white/10 rounded-[2.5rem] shadow-2xl relative">
                                <div className="absolute -top-4 -right-4 bg-yellow-400 text-black px-6 py-2 rounded-full font-black text-[10px] uppercase tracking-[0.2em] italic shadow-lg z-20">PRO PLAYER</div>
                                {/* Imagem Beach Tennis (Extensão .jpeg) */}
                                <img src="beach_tennis.jpeg" className="w-72 h-[26rem] object-cover rounded-[2rem] shadow-inner brightness-110" />
                            </div>
                            <div className="mt-10 text-center">
                                <h3 className="font-black text-6xl italic tracking-tighter uppercase text-transparent bg-clip-text bg-gradient-to-r from-sky-300 to-white drop-shadow-2xl">Campeã</h3>
                                <p className="text-sky-400 font-bold uppercase tracking-[0.4em] text-[9px] mt-4">Determination is your key</p>
                            </div>
                        </div>
                    </section>

                    {/* 8. NÓS 3 - PLACA MONTEVIDEO (Família) */}
                    <section className="snap-section bg-[#f9f9f9] p-6">
                        <div className="z-10 flex flex-col items-center w-full">
                            <h3 className="text-[10px] tracking-[0.5em] text-zinc-300 mb-12 uppercase">Family Adventures</h3>
                            <div className="relative group">
                                <div className="polaroid shadow-2xl border-t-[12px] border-rose-400 scale-105">
                                    {/* Imagem Placa Montevideo (Extensão .jpeg) */}
                                    <img src="placa_montevideo.jpeg" className="w-80 h-[28rem] object-cover" />
                                    <div className="absolute bottom-4 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur-sm px-4 py-1 rounded-full border border-zinc-100 shadow-sm text-[8px] font-bold uppercase tracking-[0.3em] text-zinc-400 italic">Montevideo Sign</div>
                                </div>
                            </div>
                            <p className="mt-16 font-serif italic text-zinc-400 text-center max-w-xs leading-relaxed">"Onde quer que vamos, o que importa é estarmos juntos."</p>
                        </div>
                    </section>

                    {/* 9. MENSAGEM FINAL (CARTA DE AMOR E ORGULHO - GENUÍNO) */}
                    <section className="snap-section bg-white text-black p-10 text-center">
                        <div className="max-w-md w-full space-y-12">
                            <div className="flex justify-center">
                                {/* Ícone Coração Animado (Pulse) */}
                                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#f43f5e" strokeWidth="1" className="animate-pulse">
                                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                                </svg>
                            </div>
                            
                            <h2 className="text-5xl font-serif italic text-zinc-800 leading-tight">Nossa Júlia,</h2>
                            
                            <div className="space-y-8 text-zinc-500 leading-relaxed font-light text-lg px-4">
                                <p className="italic">"Neste dia em que celebras 14 anos, queremos que saibas que o nosso coração transborda de alegria."</p>
                                <p className="font-semibold text-zinc-900 text-xl italic px-4">"Temos um orgulho imenso em quem TU ÉS e em tudo o que significas nas nossas vidas."</p>
                                <p className="italic font-light">"És a nossa luz, o nosso maior projeto e a razão de tantos sorrisos. Amamos-te mais do que as palavras conseguem descrever."</p>
                            </div>

                            <div className="pt-14 border-t border-zinc-100 flex flex-col items-center">
                                <p className="text-rose-500 font-bold uppercase tracking-[0.5em] text-[10px] mb-4">Com todo o nosso amor,</p>
                                <p className="text-5xl font-cursive text-zinc-900">Papai Gustavo & Mamãe Juliana</p>
                            </div>
                            
                            <button onClick={() => window.scrollTo(0,0)} className="mt-20 text-[8px] tracking-[0.5em] text-zinc-300 uppercase hover:text-rose-500 transition-colors font-bold pb-2 border-b border-zinc-100">Voltar ao Topo</button>
                        </div>
                        {/* Marca d'água de fundo */}
                        <div className="absolute top-10 right-10 text-zinc-50/50 text-8xl font-serif italic -z-10 select-none">Family First</div>
                    </section>

                </div>
            );
        };

        // Renderiza a aplicação
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
